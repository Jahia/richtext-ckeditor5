##############################################################################
# AI Assistant Proxy - AWS Bedrock Configuration
##############################################################################

# Enable/disable AI proxy
ai.enabled=true

# CK5 AI adapter config to activate
ai.adapterType=aws

# AWS Access Key ID
ai.accessKeyId=YOUR_ACCESS_KEY_ID

# AWS Secret Access Key
ai.secretAccessKey=YOUR_SECRET_ACCESS_KEY

# AWS Region (e.g., us-east-1, eu-west-1)
ai.region=eu-west-1

# AWS Bedrock Model ID
# Examples:
#   - anthropic.claude-3-7-sonnet-20250219-v1:0
#   - anthropic.claude-3-5-sonnet-20240620-v1:0
#   - arn:aws:bedrock:eu-west-1:602599330770:inference-profile/eu.anthropic.claude-3-5-sonnet-20240620-v1:0
#ai.modelId=anthropic.claude-3-5-sonnet-20240620-v1:0
ai.modelId=arn:aws:bedrock:eu-west-1:602599330770:inference-profile/eu.anthropic.claude-3-sonnet-20240229-v1:0
# ai.modelId=arn:aws:bedrock:eu-west-1:602599330770:inference-profile/eu.meta.llama3-2-3b-instruct-v1:0

# Request Parameters (flattened)
ai.requestParameters.anthropic_version=bedrock-2023-05-31
ai.requestParameters.max_tokens=2000
